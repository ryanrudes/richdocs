name: Release

# Publishes to PyPI via Trusted Publishing (OIDC — no API tokens) when a GitHub
# Release is published. One-time setup on PyPI: add a "pending publisher" for
# project `richdocs`, owner `ryanrudes`, repo `richdocs`, workflow `release.yml`,
# environment `pypi`.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  pypi-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/richdocs
    permissions:
      id-token: write # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
