# Demo / showcase site for richdocs — it documents richdocs using richdocs.
site_name: richdocs
site_description: A batteries-included documentation experience for MkDocs Material.
site_url: https://ryanrudes.github.io/richdocs/
repo_url: https://github.com/ryanrudes/richdocs
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.instant.prefetch
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.highlight
    - search.suggest

nav:
  - Home: index.md
  - Configuration: configuration.md
  - API: api.md

plugins:
  - search
  - richdocs:
      package: richdocs
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_root_heading: true
            show_root_full_path: false
            show_object_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            heading_level: 2
            members_order: source
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      use_pygments: false
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
